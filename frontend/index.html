<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>CarVal | AI Vehicle Valuation</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#0b1326",
          },
          fontFamily: {
            "display": ["Outfit", "sans-serif"],
            "body": ["Outfit", "sans-serif"],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="text-white min-h-screen bg-background relative overflow-hidden flex flex-col items-center justify-center">
  
  <!-- Auto-rotating Background Animation -->
  <canvas id="video-canvas" class="fixed top-0 left-0 w-full h-full object-cover -z-20 transition-opacity duration-1000 opacity-0" aria-hidden="true"></canvas>

  <!-- Deep fade gradient overlay for text readability -->
  <div class="fixed top-0 left-0 w-full h-full -z-10 bg-gradient-to-t from-background via-background/40 to-transparent"></div>

  <main class="z-10 text-center px-6 mt-32 relative">
    <!-- Subtle glow behind title -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-blue-500/20 blur-[100px] rounded-full -z-10 pointer-events-none"></div>
    
    <h1 class="font-display text-6xl md:text-8xl font-bold tracking-tight mb-6">CarVal</h1>
    <p class="font-body text-lg md:text-xl text-white/70 max-w-2xl mx-auto mb-12 font-light">
      AI-Powered Vehicle Valuation Engine. Get empirical market prices backed by Machine Learning and real-time depreciation metrics.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
      <a href="/predict.html" class="w-full sm:w-auto px-10 py-4 bg-white text-black font-semibold rounded-full hover:bg-gray-100 hover:scale-105 transition-all duration-300 text-lg shadow-[0_0_40px_rgba(255,255,255,0.3)]">
        Start Valuation
      </a>
      <a href="/evaluation.html" class="w-full sm:w-auto px-10 py-4 bg-white/5 text-white font-semibold rounded-full border border-white/20 hover:bg-white/10 hover:border-white/40 transition-all duration-300 text-lg backdrop-blur-md">
        Model Metrics
      </a>
    </div>
  </main>

  <script src="/landing.js"></script>
</body>
</html>
